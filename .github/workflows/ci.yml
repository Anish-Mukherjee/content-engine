name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: typecheck + migrate + vitest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      DATAFORSEO_LOGIN: ci
      DATAFORSEO_PASSWORD: ci
      PERPLEXITY_API_KEY: ci
      ANTHROPIC_API_KEY: ci
      UNSPLASH_ACCESS_KEY: ci
      GOOGLE_SERVICE_ACCOUNT_JSON_PATH: ./noop.json
      # Match the value test files set on `process.env` at runtime — env() is
      # module-cached, so the first read wins. Mismatch makes publish-due.test.ts
      # see "https://example.com" and assert against "https://xerogravity.com".
      FRONTEND_BASE_URL: https://xerogravity.com
      FRONTEND_REVALIDATE_SECRET: ci
      ADMIN_API_KEY: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # `npm ci` requires a fully resolved lockfile; this repo's package-lock.json
        # is missing some linux-x64 optional transitive deps that the host platform
        # didn't install. Falling back to `npm install` so CI is platform-tolerant
        # without touching the lockfile. Follow-up: regenerate the lockfile locally.
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Apply drizzle migrations
        run: npm run db:migrate

      - name: Run tests
        run: npm test
